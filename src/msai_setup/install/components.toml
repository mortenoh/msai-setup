# Stack components installed by `msai bootstrap`, in install order.
# Packages and daemons only -- no disk partitioning or ZFS pool creation
# (that stays a documented manual step; see docs/ubuntu/installation/).
#
# Each component declares:
#   detect  -- shell probe; exit 0 => already installed => skipped
#   method  -- "apt" (archive packages) or "curl_sh" (upstream installer)
#   post    -- shell commands run after install (group adds, enabling units);
#              $USER expands at run time
#   category-- the `msai doctor` category this maps to

[docker]
description = "Docker Engine + Compose (via the official convenience script)"
category = "docker"
detect = "command -v docker"
method = "curl_sh"
url = "https://get.docker.com"
post = [
  "sudo systemctl enable --now docker",
  "sudo usermod -aG docker $USER",
]

[zfs]
description = "ZFS userland tools (zpool/zfs); pools are created manually, not here"
category = "zfs"
detect = "command -v zpool"
method = "apt"
packages = ["zfsutils-linux"]

[rocm]
# 26.04 ships ROCm 7.x in Universe with native gfx1151 support -- no third-party
# repo and no HSA_OVERRIDE needed. See docs/ai/gpu/rocm-installation.md.
description = "AMD ROCm runtime for the Radeon 8060S (gfx1151)"
category = "gpu"
detect = "command -v rocminfo"
method = "apt"
packages = ["rocm"]
post = [
  "sudo usermod -aG render,video $USER",
]

[kvm]
description = "KVM/libvirt virtualization stack"
category = "kvm"
detect = "command -v virsh"
method = "apt"
packages = [
  # 26.04: qemu-kvm is a virtual package with multiple providers, so name the
  # concrete one. ovmf gives UEFI/Secure-Boot firmware for the Windows 11 VM.
  "qemu-system-x86",
  "qemu-utils",
  "ovmf",
  "libvirt-daemon-system",
  "libvirt-clients",
  "bridge-utils",
  "virtinst",
]
post = [
  "sudo systemctl enable --now libvirtd",
  "sudo usermod -aG libvirt,kvm $USER",
]

[tailscale]
# `tailscale up` is interactive (browser auth), so it is left to the user after
# install rather than run here.
description = "Tailscale mesh VPN (run 'sudo tailscale up' afterwards to connect)"
category = "tailscale"
detect = "command -v tailscale"
method = "curl_sh"
url = "https://tailscale.com/install.sh"

[llamacpp]
# Built from source with the ROCm/HIP backend for gfx1151 -- plain GGUF on disk,
# OpenAI-compatible llama-server, no custom model store. Requires the rocm
# component above (provides hipcc/HIP). Installs llama-server/llama-cli into
# /usr/local/bin. This is a real compile (several minutes), not a one-liner.
description = "llama.cpp with ROCm/HIP for gfx1151 (llama-server, llama-cli; plain GGUF)"
category = "inference"
detect = "command -v llama-server"
method = "script"
commands = [
  "sudo apt-get install -y git cmake libcurl4-openssl-dev",
  "rm -rf /tmp/llama.cpp-src && git clone --depth 1 https://github.com/ggml-org/llama.cpp /tmp/llama.cpp-src",
  # HIPCXX/HIP_PATH point cmake at the ROCm clang (distro ROCm lives in /usr, not /opt/rocm).
  "HIPCXX=$(hipconfig -l)/clang HIP_PATH=$(hipconfig -R) cmake -S /tmp/llama.cpp-src -B /tmp/llama.cpp-src/build -DGGML_HIP=ON -DAMDGPU_TARGETS=gfx1151 -DCMAKE_BUILD_TYPE=Release",
  "cmake --build /tmp/llama.cpp-src/build --config Release -j",
  "sudo cmake --install /tmp/llama.cpp-src/build",
  # cmake --install does not refresh the loader cache; without this the binaries
  # fail with 'libllama-server-impl.so: cannot open shared object file'.
  "sudo ldconfig",
]
