---
# Install Docker CE + Compose plugin. Matches the production setup in
# docs/docker/setup.md, including the resolute -> noble codename fallback.

- hosts: lab
  become: true
  gather_facts: true

  vars:
    docker_repo_codename_override: ""    # set to e.g. 'noble' to skip detection

  tasks:
    - name: docker — prerequisites
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg
        state: present
        update_cache: true

    - name: docker — keyring dir
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: docker — GPG key
      ansible.builtin.get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: "0644"
        force: true

    - name: docker — detect a working codename for the repo
      when: docker_repo_codename_override | length == 0
      block:
        - name: docker — try current ubuntu codename first
          ansible.builtin.uri:
            url: "https://download.docker.com/linux/ubuntu/dists/{{ ansible_distribution_release }}/Release"
            method: HEAD
            status_code: [200, 404]
            return_content: false
          register: docker_codename_probe
          changed_when: false
          check_mode: false

        - name: docker — pick codename (fallback to noble)
          ansible.builtin.set_fact:
            docker_codename: >-
              {{ ansible_distribution_release
                 if docker_codename_probe.status == 200
                 else 'noble' }}

    - name: docker — set codename from override
      when: docker_repo_codename_override | length > 0
      ansible.builtin.set_fact:
        docker_codename: "{{ docker_repo_codename_override }}"

    - name: docker — confirm chosen codename
      ansible.builtin.debug:
        msg: "Using Docker repo codename: {{ docker_codename }}"

    - name: docker — apt source
      ansible.builtin.copy:
        dest: /etc/apt/sources.list.d/docker.list
        owner: root
        group: root
        mode: "0644"
        content: |
          deb [arch={{ ansible_architecture | replace('x86_64', 'amd64') | replace('aarch64', 'arm64') }} signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ docker_codename }} stable

    - name: docker — install
      ansible.builtin.apt:
        update_cache: true
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present

    - name: docker — add user to docker group (no more sudo for docker)
      ansible.builtin.user:
        name: "{{ ansible_user }}"
        groups: docker
        append: true

    - name: docker — daemon.json
      ansible.builtin.copy:
        dest: /etc/docker/daemon.json
        owner: root
        group: root
        mode: "0644"
        content: |
          {
            "storage-driver": "overlay2",
            "log-driver": "json-file",
            "log-opts": {
              "max-size": "10m",
              "max-file": "3"
            }
          }
      notify: restart docker

    - name: docker — service enabled + started
      ansible.builtin.systemd:
        name: docker
        enabled: true
        state: started

    - name: docker — smoke test (hello-world)
      ansible.builtin.command: docker run --rm hello-world
      register: docker_smoke
      changed_when: false
      failed_when: docker_smoke.rc != 0

    - name: docker — smoke test output
      ansible.builtin.debug:
        msg: "{{ docker_smoke.stdout_lines | select('match', 'Hello') | list }}"

  handlers:
    - name: restart docker
      ansible.builtin.systemd:
        name: docker
        state: restarted
