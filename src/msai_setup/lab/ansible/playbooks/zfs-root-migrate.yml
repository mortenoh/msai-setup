---
# Migrate a running ext4-rooted Ubuntu into the documented root-on-ZFS +
# ZFSBootMenu, two-independent-pool architecture — IN PLACE, by copying the
# live system across rather than debootstrapping a fresh one.
#
# This mirrors docs/ubuntu/installation/installation-walkthrough.md step for
# step, with one substitution: instead of `debootstrap`-ing an empty base
# system into rpool/ROOT/ubuntu, it `rsync`s the already-installed running
# system in. Everything else (partition scheme, exact `zpool create` flags,
# ZFSBootMenu install, efibootmgr registration, EFI-only fstab) matches the
# canonical docs verbatim — see docs/ubuntu/installation/disk-partitioning.md.
#
# The two target disks stand in for the MS-S1 MAX's two physical NVMe drives:
#   fast/large -> rpool  (EFI System Partition + pool member, root + hot data)
#   slow/small -> tank   (single pool member, bulk cold data)
# They are the two DEDICATED migration disks the lab provisions in addition to
# the 6 ZFS-practice disks (see src/msai_setup/lab/config.py) — this playbook
# never touches the practice disks or the original ext4 root disk.
#
# Reboot handling: on real hardware run this with the default `do_reboot=true`
# and firmware honours the efibootmgr entry, landing you in ZFSBootMenu. In the
# VirtualBox lab, `msai lab migrate` passes `-e do_reboot=false` and performs the
# boot swap host-side (VBox NVRAM is not reliable), so the playbook stops after a
# clean pool export. See src/msai_setup/lab/migrate.py.
#
#   ansible-playbook zfs-root-migrate.yml                 # real hardware, reboots
#   ansible-playbook zfs-root-migrate.yml -e do_reboot=false
#   ansible-playbook zfs-root-migrate.yml -e fast_disk=/dev/disk/by-id/... \
#                                         -e slow_disk=/dev/disk/by-id/...

- hosts: lab
  become: true
  gather_facts: true

  vars:
    rpool_name: rpool
    tank_name: tank
    root_ds: rpool/ROOT/ubuntu
    target_mnt: /mnt
    # ZFSBootMenu reads this from a ZFS property and appends root=zfs:<bootfs>.
    zbm_cmdline: "quiet loglevel=4"
    # Reboot into the new system at the end (true on real hardware; the lab
    # command sets this false and swaps boot disks host-side instead).
    do_reboot: true
    reboot_timeout: 900
    # Leave empty to auto-detect the two largest non-root disks; the LARGER of
    # the two becomes rpool (fast), the smaller becomes tank (slow). Override
    # with stable /dev/disk/by-id/... paths on real hardware.
    fast_disk: ""
    slow_disk: ""

  tasks:
    # -- Guard rails ----------------------------------------------------------

    - name: migrate — refuse to run if root is already ZFS
      ansible.builtin.command: findmnt -no FSTYPE /
      register: root_fstype
      changed_when: false

    - name: migrate — assert we are migrating FROM an ext4/other root, not a ZFS one
      ansible.builtin.assert:
        that: root_fstype.stdout | trim != 'zfs'
        fail_msg: >-
          Root filesystem is already ZFS ({{ root_fstype.stdout | trim }}). This
          host looks migrated already; refusing to re-run to avoid wiping the
          new pools. Destroy rpool/tank first if you really want to redo it.
        success_msg: "Root is {{ root_fstype.stdout | trim }} — safe to migrate."

    # -- Tooling on the running (source) system -------------------------------

    - name: migrate — install ZFS + partitioning + copy tooling (source system)
      ansible.builtin.apt:
        name:
          - zfsutils-linux
          - gdisk
          - parted
          - dosfstools
          - rsync
          - curl
          - efibootmgr
        state: present
        update_cache: true

    - name: migrate — load the ZFS kernel module
      community.general.modprobe:
        name: zfs
        state: present

    # A stable hostid must exist BEFORE pool creation and be identical in the
    # migrated system, or ZFS treats the pool as "owned by another host" at
    # import time. Generating it now and rsync-ing it across keeps them aligned.
    - name: migrate — ensure a persistent /etc/hostid exists
      ansible.builtin.command: zgenhostid
      args:
        creates: /etc/hostid

    # -- Identify the two target disks ----------------------------------------

    - name: migrate — find the disk backing the current root
      ansible.builtin.shell: |
        set -euo pipefail
        src=$(findmnt -no SOURCE /)
        lsblk -no pkname "$src" | head -1
      register: root_disk_name
      changed_when: false

    - name: migrate — enumerate candidate disks (largest first, root excluded)
      ansible.builtin.shell: |
        set -euo pipefail
        root_disk="{{ root_disk_name.stdout | trim }}"
        lsblk -bdn -o NAME,SIZE,TYPE | awk '$3=="disk"{print $2, $1}' | sort -rn | \
        while read -r size name; do
          [ "$name" = "$root_disk" ] && continue
          byid=""
          for l in /dev/disk/by-id/*; do
            [ -L "$l" ] || continue
            case "$l" in *-part*) continue ;; esac
            [ "$(readlink -f "$l")" = "/dev/$name" ] || continue
            case "$l" in */ata-VBOX*|*/nvme-*) byid="$l"; break ;; esac
            [ -z "$byid" ] && byid="$l"
          done
          [ -n "$byid" ] && echo "$size $byid"
        done
      register: disk_scan
      changed_when: false

    - name: migrate — auto-pick fast (rpool) and slow (tank) disks
      when: fast_disk | length == 0 or slow_disk | length == 0
      ansible.builtin.set_fact:
        fast_disk: "{{ disk_scan.stdout_lines[0].split()[1] }}"
        slow_disk: "{{ disk_scan.stdout_lines[1].split()[1] }}"

    - name: migrate — show the chosen target disks
      ansible.builtin.debug:
        msg:
          - "candidates (size by-id): {{ disk_scan.stdout_lines }}"
          - "fast/rpool -> {{ fast_disk }}"
          - "slow/tank  -> {{ slow_disk }}"

    - name: migrate — sanity-check the disk choice
      ansible.builtin.assert:
        that:
          - fast_disk | length > 0
          - slow_disk | length > 0
          - fast_disk != slow_disk
        fail_msg: "Could not identify two distinct target disks. Pass fast_disk / slow_disk explicitly."

    # Whether the pools already exist decides whether the destructive disk-prep
    # runs. On a fresh migration they do not (all of the below runs); on a resumed
    # run after a mid-flight failure they do, so we skip re-partitioning devices
    # that are now held by imported pools (which would fail "device busy").
    - name: migrate — check whether rpool already exists
      ansible.builtin.command: "zpool list -H -o name {{ rpool_name }}"
      register: rpool_check
      failed_when: false
      changed_when: false

    - name: migrate — check whether tank already exists
      ansible.builtin.command: "zpool list -H -o name {{ tank_name }}"
      register: tank_check
      failed_when: false
      changed_when: false

    # -- Partition both disks (docs: disk-partitioning.md) ---------------------

    - name: migrate — partition and prep the target disks
      when: rpool_check.rc != 0
      block:
        - name: migrate — partition the fast disk (EFI + rpool member)
          ansible.builtin.shell: |
            set -euo pipefail
            sgdisk --zap-all "{{ fast_disk }}"
            sgdisk -n1:1M:+512M -t1:EF00 "{{ fast_disk }}"
            sgdisk -n2:0:0      -t2:BF00 "{{ fast_disk }}"
          changed_when: true

        - name: migrate — partition the slow disk (single tank member)
          ansible.builtin.shell: |
            set -euo pipefail
            sgdisk --zap-all "{{ slow_disk }}"
            sgdisk -n1:0:0 -t1:BF00 "{{ slow_disk }}"
          changed_when: true

        - name: migrate — re-read partition tables and settle udev
          ansible.builtin.shell: |
            set -euo pipefail
            partprobe "{{ fast_disk }}" "{{ slow_disk }}" || true
            udevadm settle
          changed_when: false

        - name: migrate — wait for the partition device nodes to appear
          ansible.builtin.wait_for:
            path: "{{ item }}"
            timeout: 30
          loop:
            - "{{ fast_disk }}-part1"
            - "{{ fast_disk }}-part2"
            - "{{ slow_disk }}-part1"

        # Clear any stale filesystem/ZFS signatures on the fresh partitions so
        # `zpool create` (no -f) succeeds cleanly.
        - name: migrate — wipe stale signatures on the new partitions
          ansible.builtin.command: "wipefs -a {{ item }}"
          loop:
            - "{{ fast_disk }}-part1"
            - "{{ fast_disk }}-part2"
            - "{{ slow_disk }}-part1"
          changed_when: true

    # -- Create rpool + datasets (docs: disk-partitioning.md) ------------------

    - name: migrate — create rpool and its root/home datasets
      when: rpool_check.rc != 0
      block:
        - name: migrate — zpool create rpool (fast drive)
          ansible.builtin.command: >-
            zpool create
            -o ashift=12 -o autotrim=on
            -O acltype=posixacl -O xattr=sa -O compression=lz4
            -O relatime=on -O canmount=off -O mountpoint=none
            -R {{ target_mnt }}
            {{ rpool_name }} {{ fast_disk }}-part2
          changed_when: true

        - name: migrate — create rpool/ROOT container
          ansible.builtin.command: "zfs create -o canmount=off -o mountpoint=none {{ rpool_name }}/ROOT"
          changed_when: true

        - name: migrate — create the boot environment rpool/ROOT/ubuntu
          ansible.builtin.command: "zfs create -o canmount=noauto -o mountpoint=/ {{ root_ds }}"
          changed_when: true

        - name: migrate — create rpool/home
          ansible.builtin.command: "zfs create -o mountpoint=/home {{ rpool_name }}/home"
          changed_when: true

    - name: migrate — mount the boot environment and home under the altroot
      ansible.builtin.shell: |
        set -euo pipefail
        zfs mount | grep -q " {{ target_mnt }}$" || zfs mount {{ root_ds }}
        zfs mount | grep -q " {{ target_mnt }}/home$" || zfs mount {{ rpool_name }}/home
      changed_when: true

    # -- Create tank (docs: disk-partitioning.md) ------------------------------

    - name: migrate — zpool create tank (slow drive)
      when: tank_check.rc != 0
      ansible.builtin.command: >-
        zpool create
        -o ashift=12 -o autotrim=on
        -O acltype=posixacl -O xattr=sa -O compression=lz4
        -O relatime=on
        -R {{ target_mnt }}
        {{ tank_name }} {{ slow_disk }}-part1
      changed_when: true

    # -- Copy the running system into the new root ----------------------------

    # -x (one-file-system) keeps rsync on the live root device: /proc /sys /dev
    # /run /tmp, the old /boot/efi (a separate FAT mount) and the new /mnt target
    # (a separate ZFS mount) are all naturally skipped, so there is no infinite
    # recursion into the target and no garbage pseudo-filesystem content. The
    # explicit --exclude lines are belt-and-suspenders for the same set.
    - name: migrate — rsync the live system into rpool/ROOT/ubuntu
      ansible.builtin.command: >-
        rsync -aHAXx --numeric-ids
        --exclude=/proc/* --exclude=/sys/* --exclude=/dev/*
        --exclude=/run/* --exclude=/tmp/* --exclude=/mnt/*
        --exclude=/media/* --exclude=/lost+found
        --exclude=/swap.img --exclude=/var/lib/zfs-lab
        / {{ target_mnt }}/
      changed_when: true

    - name: migrate — ensure the target has an /etc/zfs with the pool cache
      ansible.builtin.shell: |
        set -euo pipefail
        mkdir -p {{ target_mnt }}/etc/zfs
        [ -f /etc/zfs/zpool.cache ] && cp -f /etc/zfs/zpool.cache {{ target_mnt }}/etc/zfs/ || true
        cp -f /etc/hostid {{ target_mnt }}/etc/hostid
      changed_when: true

    # -- Format + mount the EFI System Partition ------------------------------

    - name: migrate — mkfs the EFI System Partition
      when: rpool_check.rc != 0
      ansible.builtin.command: "mkfs.vfat -F32 -n EFI {{ fast_disk }}-part1"
      changed_when: true

    - name: migrate — mount the ESP at the target /boot/efi
      ansible.builtin.shell: |
        set -euo pipefail
        mkdir -p {{ target_mnt }}/boot/efi
        mountpoint -q {{ target_mnt }}/boot/efi || mount {{ fast_disk }}-part1 {{ target_mnt }}/boot/efi
      changed_when: true

    # -- Bind-mount pseudo-filesystems and prepare the chroot -----------------

    - name: migrate — bind-mount /dev /proc /sys into the target
      ansible.builtin.shell: |
        set -euo pipefail
        for fs in dev proc sys; do
          mountpoint -q {{ target_mnt }}/$fs || mount --make-private --rbind /$fs {{ target_mnt }}/$fs
        done
      changed_when: true

    # Give the chroot working DNS for apt/curl (the rsync'd resolv.conf is a
    # systemd-resolved stub symlink that won't resolve without /run bound).
    - name: migrate — give the chroot a working resolv.conf
      ansible.builtin.shell: |
        set -euo pipefail
        rm -f {{ target_mnt }}/etc/resolv.conf
        printf 'nameserver 1.1.1.1\nnameserver 8.8.8.8\n' > {{ target_mnt }}/etc/resolv.conf
      changed_when: true

    # -- Inside the chroot: ZFS boot support + initramfs ----------------------

    # Ubuntu 26.04 generates its initramfs with dracut (update-initramfs is a
    # dracut shim), so the ZFS boot hook comes from zfs-dracut — NOT the
    # initramfs-tools-era zfs-initramfs. A dracut.conf.d drop-in force-includes
    # the zfs module so the regenerated initramfs can import rpool and mount
    # root=zfs:rpool/ROOT/ubuntu even though we build it from a chroot.
    - name: migrate — install ZFS boot support and regenerate the initramfs (chroot)
      ansible.builtin.command:
        cmd: "chroot {{ target_mnt }} /usr/bin/env DEBIAN_FRONTEND=noninteractive bash -euo pipefail -c '{{ item }}'"
      loop:
        - "apt-get update"
        - "apt-get install -y --no-install-recommends zfsutils-linux zfs-dracut dosfstools efibootmgr curl"
        - "mkdir -p /etc/dracut.conf.d && printf 'add_dracutmodules+=\" zfs \"\\n' > /etc/dracut.conf.d/90-zfs-root.conf"
        - "update-initramfs -c -k all"
      changed_when: true

    # -- Inside the chroot: install ZFSBootMenu (arch-aware) ------------------

    # x86_64 uses the canonical prebuilt EFI binary from get.zfsbootmenu.org/efi
    # (exactly as the walkthrough documents). aarch64 has no prebuilt image, so
    # it is built locally with generate-zbm (ZBM >= 3.1 supports aarch64). Both
    # paths also drop the binary at the ESP fallback path (\EFI\BOOT\BOOT*.EFI)
    # so firmware that ignores NVRAM entries — VirtualBox in particular — still
    # boots ZFSBootMenu from this disk.
    - name: migrate — set the ZFSBootMenu kernel command line property
      ansible.builtin.command: >-
        chroot {{ target_mnt }} zfs set
        org.zfsbootmenu:commandline="{{ zbm_cmdline }}" {{ root_ds }}
      changed_when: true

    - name: migrate — install ZFSBootMenu (x86_64 prebuilt binary)
      when: ansible_architecture == 'x86_64'
      ansible.builtin.shell: |
        set -euo pipefail
        chroot {{ target_mnt }} bash -euo pipefail -c '
          mkdir -p /boot/efi/EFI/ZBM /boot/efi/EFI/BOOT
          curl -sSfL -o /boot/efi/EFI/ZBM/VMLINUZ.EFI https://get.zfsbootmenu.org/efi
          cp /boot/efi/EFI/ZBM/VMLINUZ.EFI /boot/efi/EFI/ZBM/VMLINUZ-BACKUP.EFI
          cp /boot/efi/EFI/ZBM/VMLINUZ.EFI /boot/efi/EFI/BOOT/BOOTX64.EFI
        '
      changed_when: true

    # Ubuntu ships no `zfsbootmenu` package, so on aarch64 we build generate-zbm
    # from the upstream source release (per the ZFSBootMenu Ubuntu UEFI guide)
    # and let it emit an aarch64 EFI (ZBM >= 3.1 supports aarch64; it uses the
    # systemd linuxaa64.efi.stub from systemd-boot-efi).
    - name: migrate — install ZFSBootMenu (aarch64 built from source with generate-zbm)
      when: ansible_architecture == 'aarch64'
      ansible.builtin.shell: |
        set -euo pipefail
        chroot {{ target_mnt }} /usr/bin/env DEBIAN_FRONTEND=noninteractive bash -euo pipefail -c '
          apt-get install -y --no-install-recommends \
            libsort-versions-perl libboolean-perl libyaml-pp-perl \
            git fzf make mbuffer kexec-tools dracut-core efibootmgr \
            bsdextrautils systemd-boot-efi
          mkdir -p /usr/local/src/zfsbootmenu
          cd /usr/local/src/zfsbootmenu
          curl -sSfL https://get.zfsbootmenu.org/source | tar -zxv --strip-components=1 -f -
          make core dracut
          mkdir -p /etc/zfsbootmenu/dracut.conf.d /boot/efi/EFI/ZBM /boot/efi/EFI/BOOT
          cat > /etc/zfsbootmenu/config.yaml <<EOF
        Global:
          ManageImages: true
          BootMountPoint: /boot/efi
          DracutConfDir: /etc/zfsbootmenu/dracut.conf.d
        Components:
          Enabled: false
        EFI:
          ImageDir: /boot/efi/EFI/ZBM
          Versions: false
          Enabled: true
        Kernel:
          CommandLine: quiet loglevel=0
        EOF
          generate-zbm --debug
          img=$(ls -1 /boot/efi/EFI/ZBM/*.EFI 2>/dev/null | head -1)
          test -n "$img"
          # generate-zbm emits vmlinuz.EFI; the ESP is case-insensitive vfat, so
          # the efibootmgr loader \EFI\ZBM\VMLINUZ.EFI already resolves to it. We
          # only need the removable-media fallback copy (a different directory).
          cp -f "$img" /boot/efi/EFI/BOOT/BOOTAA64.EFI
        '
      changed_when: true

    # -- Register the EFI boot entry (docs: installation-walkthrough.md) ------

    # On real hardware this is THE mechanism that makes the box boot ZFSBootMenu.
    # In VirtualBox, NVRAM persistence is unreliable, so this is best-effort (the
    # fallback \EFI\BOOT binary above is what actually boots the lab VM). We still
    # register + reorder it so the flow matches production faithfully.
    - name: migrate — register ZFSBootMenu with efibootmgr and put it first
      ansible.builtin.shell: |
        set -euo pipefail
        loader='\EFI\ZBM\VMLINUZ.EFI'
        # Drop any stale ZFSBootMenu entries so re-runs do not pile up duplicates.
        for b in $(efibootmgr | sed -n 's/^Boot\([0-9A-Fa-f]\{4\}\).* ZFSBootMenu$/\1/p'); do
          efibootmgr -b "$b" -B >/dev/null 2>&1 || true
        done
        efibootmgr --create --disk "{{ fast_disk }}" --part 1 \
          --label "ZFSBootMenu" --loader "$loader"
        # --create already prepends the new entry to BootOrder.
        efibootmgr -v || true
      register: efibootmgr_out
      changed_when: true
      failed_when: false

    - name: migrate — efibootmgr result (best-effort in VirtualBox)
      ansible.builtin.debug:
        var: efibootmgr_out.stdout_lines

    # -- EFI-only fstab (docs: installation-walkthrough.md) -------------------

    - name: migrate — write an EFI-only /etc/fstab on the target
      ansible.builtin.shell: |
        set -euo pipefail
        efi_uuid=$(blkid -s UUID -o value "{{ fast_disk }}-part1")
        cat > {{ target_mnt }}/etc/fstab <<EOF
        # Managed by zfs-root-migrate.yml — ZFS datasets mount natively (no fstab).
        UUID=${efi_uuid}  /boot/efi  vfat  umask=0077,fmask=0077,dmask=0077  0 1
        EOF
      changed_when: true

    # -- Tear down the chroot and export the pools ----------------------------

    - name: migrate — unmount the chroot binds and the ESP
      ansible.builtin.shell: |
        set -euo pipefail
        umount -R {{ target_mnt }}/boot/efi 2>/dev/null || true
        umount -R {{ target_mnt }}/dev {{ target_mnt }}/proc {{ target_mnt }}/sys 2>/dev/null || true
      changed_when: true

    - name: migrate — export the pools for a clean first import
      ansible.builtin.shell: |
        set -euo pipefail
        zpool export {{ tank_name }} 2>/dev/null || true
        zpool export {{ rpool_name }} 2>/dev/null || true
      changed_when: true

    - name: migrate — summary
      ansible.builtin.debug:
        msg:
          - "Migration copy complete."
          - "rpool -> {{ fast_disk }} (EFI on -part1, pool on -part2)"
          - "tank  -> {{ slow_disk }}-part1"
          - "ZFSBootMenu installed to the ESP (+ \\EFI\\BOOT fallback)."
          - "{{ 'Rebooting into ZFSBootMenu now.' if do_reboot | bool else 'do_reboot=false — caller handles the boot swap.' }}"

    # -- Reboot into the new system (real hardware path) ----------------------

    - name: migrate — reboot into ZFSBootMenu
      when: do_reboot | bool
      ansible.builtin.reboot:
        reboot_timeout: "{{ reboot_timeout }}"
        msg: "Rebooting into root-on-ZFS via ZFSBootMenu (zfs-root-migrate)"
